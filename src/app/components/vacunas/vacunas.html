<div class="vacunas-container">
  <header class="header">
    <h1>Control Sanitario</h1>
    <p>Historial y próximas vacunas</p>
  </header>

  <section class="add-vacuna">
    <h3>Registrar Vacuna</h3>
    <div class="form-grid">
      <select [(ngModel)]="nuevaVacuna.mascotaId">
        <option value="" disabled>Selecciona mascota</option>
        <option *ngFor="let m of mascotas" [value]="m.id">{{m.nombre}}</option>
      </select>
      
      <input type="text" [(ngModel)]="nuevaVacuna.nombre" placeholder="Nombre Vacuna (Ej: Antirrábica)">
      <input type="text" [(ngModel)]="nuevaVacuna.clinica" placeholder="Clínica / Veterinario">
      <input type="date" [(ngModel)]="nuevaVacuna.fecha">
      
      <select [(ngModel)]="nuevaVacuna.estado">
        <option value="Completada">Completada</option>
        <option value="Pendiente">Pendiente / Próxima</option>
      </select>
      
      <button class="btn-save" (click)="registrarVacuna()">Registrar Vacuna</button>
    </div>
  </section>

  <section class="vacuna-list">
    <div class="vacuna-card" *ngFor="let v of vacunas" [class.pending]="v.estado === 'Pendiente'">
      <div class="card-main">
        <div class="icon">💉</div>
        <div class="info">
          <h4>{{ v.nombre }}</h4>
          <p class="pet-tag">🐾 {{ v.mascotaNombre }}</p>
          <p class="date-tag">📅 {{ v.fecha | date:'dd MMMM, yyyy' }}</p>
          <p class="clinic-tag" *ngIf="v.clinica">🏥 {{ v.clinica }}</p>
        </div>
        <div class="status-container">
          <span class="status-tag">{{ v.estado }}</span>
        </div>
      </div>
    </div>
  </section>
</div>
