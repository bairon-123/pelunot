<div class="admin-wrapper">
  <aside class="sidebar">
    <div class="header-top">
      <div class="brand">
        <img src="image/pelunot_foto.jpg" class="mini-logo" alt="Logo">
        <span>Pelunot Admin</span>
      </div>

      <div class="sidebar-footer">
        <button class="btn-logout" (click)="cerrarSesion()">
          Cerrar Sesión
        </button>
      </div>
    </div>
    
    <nav class="menu">
      <a routerLink="dashboard" routerLinkActive="active-link">
        <span class="icon">📊</span> 
        <span class="text">Dashboard</span>
      </a>
      
      <a routerLink="usuarios" routerLinkActive="active-link">
        <span class="icon">👥</span> 
        <span class="text">Usuarios</span>
      </a>
      
      <a routerLink="reportes" routerLinkActive="active-link">
        <span class="icon">📄</span> 
        <span class="text">Reportes</span>
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
