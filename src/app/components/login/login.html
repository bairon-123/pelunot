<div class="login-wrapper">
  <div class="login-card">
    <div class="logo-section">
      <img src="image/pelunot_foto.jpg" alt="Logo Pelunot" class="logo">
      <h1>Pelunot</h1>
      <p>Bienvenido de vuelta</p>
    </div>

    <form class="login-form">
      <div class="input-field">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="tu@correo.com">
      </div>

      <div class="input-field">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="********">
      </div>

      <button type="button" class="btn-primary" (click)="ingresar()">
        Iniciar Sesión
      </button>

      <div class="footer-links">
        <a (click)="recuperarClave()">¿Olvidaste tu contraseña?</a>
        <a routerLink="/register">Crear una cuenta</a>
      </div>
    </form>
  </div>
</div>
